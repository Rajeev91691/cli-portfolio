    <meta name="description" content="Explore Rajeev Nandan Damarla's portfolio showcasing distributed systems, full-stack web applications, AI/ML models, and coding expertise." />

    <script defer src="js/commands.js"></script>
    <script defer src="js/inputRenderer.js"></script>
    <script defer src="js/commandParser.js"></script>
  </head>
  <body>
    <div id="terminal">
      <a id="contentHook"></a>
    </div>
    <div id="command">
      <textarea
        type="text"
        id="texter"
        placeholder="Enter your command here..."
      ></textarea>
      <div id="liner">
        <span id="typer"></span>
        <b class="cursor" id="cursor">█</b>
        <span id="mobileInput">
          <input 
            type="text" 
            autocapitalize="none" 
            autocorrect="off" 
            spellcheck="false" 
            autocomplete="off" 
            inputmode="text" 
            placeholder="Type here..."
            id="mobileInput"
          >
        </span>
      </div>
    </div>
  </body>
